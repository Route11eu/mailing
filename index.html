<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROUTE11 · Mailing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0c0e14;
      --bg-card: #13161f;
      --bg-card-hover: #181c28;
      --border: #1e2332;
      --border-active: #3b82f6;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-muted: #475569;
      --accent-blue: #3b82f6;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-orange: #f59e0b;
      --accent-purple: #a855f7;
      --green-dark: #166534;
      --red-dark: #991b1b;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle animated grid bg */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    .slide-up {
      animation: slideUp 0.5s ease-out;
    }

    .shake {
      animation: shake 0.3s ease-in-out;
    }

    /* PIN input styles */
    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      transition: all 0.2s ease;
      background: transparent;
    }

    .pin-dot.filled {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
    }

    .pin-dot.error {
      background: var(--accent-red);
      border-color: var(--accent-red);
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
    }

    .pin-key {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .pin-key:hover {
      background: var(--bg-card-hover);
      border-color: var(--text-muted);
    }

    .pin-key:active {
      transform: scale(0.92);
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    /* Input styles */
    input,
    select,
    textarea {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    select {
      cursor: pointer;
    }

    select option {
      background: var(--bg-card);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Button styles */
    .btn {
      padding: 12px 24px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
    }

    .btn-green {
      background: var(--accent-green);
      color: white;
    }

    .btn-green:hover:not(:disabled) {
      background: #16a34a;
      transform: translateY(-1px);
    }

    .btn-red {
      background: var(--accent-red);
      color: white;
    }

    .btn-red:hover:not(:disabled) {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .btn-orange {
      background: var(--accent-orange);
      color: #1a1a1a;
    }

    .btn-orange:hover:not(:disabled) {
      background: #d97706;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--bg-card-hover);
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      animation: fadeIn 0.3s ease-out;
      max-width: 400px;
      box-shadow: var(--shadow);
    }

    .toast-success {
      background: var(--green-dark);
      color: #bbf7d0;
      border: 1px solid #22c55e44;
    }

    .toast-error {
      background: var(--red-dark);
      color: #fecaca;
      border: 1px solid #ef444444;
    }

    .toast-info {
      background: #1e3a5f;
      color: #93c5fd;
      border: 1px solid #3b82f644;
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-green {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
    }

    .badge-red {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }

    .badge-blue {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }

    .badge-orange {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
    }

    /* Checkbox */
    .checkbox-custom {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .checkbox-custom:checked {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    .checkbox-custom:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    /* Toggle switch */
    .toggle-track {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--border);
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle-track.active {
      background: var(--accent-blue);
    }

    .toggle-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle-track.active .toggle-thumb {
      transform: translateX(20px);
    }

    /* Tab styles */
    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .tab-btn.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
    }

    /* Preview frame */
    .preview-frame {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ==================== CONSTANTS ====================
    const PIN_CODE = '1168';

    // GetResponse API nie obsługuje CORS — potrzebny proxy.
    // Po utworzeniu Cloudflare Worker wklej tutaj jego URL:
    const USE_PROXY = true;
    const PROXY_URL = 'https://gr-proxy.office-77f.workers.dev';
    const GR_API_DIRECT = 'https://api.getresponse.com/v3';

    const COUNTRY_NAMES = {
      'DE': 'Germany', 'PL': 'Poland', 'BE': 'Belgium', 'NL': 'Netherlands',
      'FR': 'France', 'AT': 'Austria', 'CZ': 'Czechia', 'HU': 'Hungary',
      'IT': 'Italy', 'ES': 'Spain', 'SK': 'Slovakia', 'CH': 'Switzerland',
      'DK': 'Denmark', 'SE': 'Sweden', 'UK': 'United Kingdom'
    };

    const COUNTRY_FLAGS = {
      'DE': '🇩🇪', 'PL': '🇵🇱', 'BE': '🇧🇪', 'NL': '🇳🇱', 'FR': '🇫🇷',
      'AT': '🇦🇹', 'CZ': '🇨🇿', 'HU': '🇭🇺', 'IT': '🇮🇹', 'ES': '🇪🇸',
      'SK': '🇸🇰', 'CH': '🇨🇭', 'DK': '🇩🇰', 'SE': '🇸🇪', 'UK': '🇬🇧'
    };

    // ==================== GETRESPONSE API SERVICE ====================
    class GetResponseAPI {
      constructor(apiKey) {
        this.apiKey = apiKey;
      }

      async request(endpoint, method = 'GET', body = null) {
        let url, opts;

        if (USE_PROXY) {
          // Proxy mode: send everything to proxy.php
          url = PROXY_URL;
          opts = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              apiKey: this.apiKey,
              endpoint: endpoint,
              method: method,
              body: body
            })
          };
        } else {
          // Direct mode (wymaga CORS - nie działa z przeglądarki)
          url = GR_API_DIRECT + endpoint;
          opts = {
            method,
            headers: {
              'X-Auth-Token': `api-key ${this.apiKey}`,
              'Content-Type': 'application/json'
            }
          };
          if (body) opts.body = JSON.stringify(body);
        }

        const res = await fetch(url, opts);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || err.error || `HTTP ${res.status}: ${res.statusText}`);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      async getCampaigns() {
        return this.request('/campaigns?perPage=100');
      }

      async getFromFields() {
        return this.request('/from-fields');
      }

      async getNewsletters(params = {}) {
        const qs = new URLSearchParams(params).toString();
        return this.request(`/newsletters${qs ? '?' + qs : ''}`);
      }

      async createNewsletter(data) {
        return this.request('/newsletters', 'POST', data);
      }

      async getAccountInfo() {
        return this.request('/accounts');
      }
    }

    // ==================== TOAST SYSTEM ====================
    function Toast({ toasts, removeToast }) {
      return (
        <div>
          {toasts.map(t => (
            <div key={t.id} className={`toast toast-${t.type}`} onClick={() => removeToast(t.id)}>
              {t.type === 'success' && '✓ '}{t.type === 'error' && '✕ '}{t.type === 'info' && 'ℹ '}
              {t.message}
            </div>
          ))}
        </div>
      );
    }

    function useToast() {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));
      return { toasts, addToast, removeToast };
    }

    // ==================== MAIN APP ====================
    function App() {
      const [authenticated, setAuthenticated] = useState(false);
      const [apiKey, setApiKey] = useState(() => {
        try { return localStorage.getItem('gr_api_key') || ''; } catch { return ''; }
      });
      const [grApi, setGrApi] = useState(null);
      const { toasts, addToast, removeToast } = useToast();

      useEffect(() => {
        try {
          // Auto-login via URL param (from dashboard)
          const params = new URLSearchParams(window.location.search);
          if (params.get('auth') === PIN_CODE) {
            setAuthenticated(true);
            sessionStorage.setItem('r11_auth', 'true');
            // Clean URL
            window.history.replaceState({}, '', window.location.pathname);
            return;
          }
          if (sessionStorage.getItem('r11_auth') === 'true') setAuthenticated(true);
        } catch { }
      }, []);

      useEffect(() => {
        if (apiKey) {
          setGrApi(new GetResponseAPI(apiKey));
          try { localStorage.setItem('gr_api_key', apiKey); } catch { }
        }
      }, [apiKey]);

      const handleLogin = () => {
        setAuthenticated(true);
        try { sessionStorage.setItem('r11_auth', 'true'); } catch { }
      };

      const handleLogout = () => {
        setAuthenticated(false);
        try { sessionStorage.removeItem('r11_auth'); } catch { }
      };

      if (!authenticated) {
        return (
          <>
            <Toast toasts={toasts} removeToast={removeToast} />
            <PinScreen onSuccess={handleLogin} addToast={addToast} />
          </>
        );
      }

      return (
        <>
          <Toast toasts={toasts} removeToast={removeToast} />
          <MainApp
            apiKey={apiKey}
            setApiKey={setApiKey}
            grApi={grApi}
            addToast={addToast}
            onLogout={handleLogout}
          />
        </>
      );
    }

    // ==================== PIN SCREEN ====================
    function PinScreen({ onSuccess, addToast }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState(false);

      const handleKey = (num) => {
        if (pin.length >= 4) return;
        const newPin = pin + num;
        setPin(newPin);
        setError(false);

        if (newPin.length === 4) {
          if (newPin === PIN_CODE) {
            setTimeout(onSuccess, 300);
          } else {
            setError(true);
            addToast('Invalid PIN. Try again.', 'error');
            setTimeout(() => { setPin(''); setError(false); }, 800);
          }
        }
      };

      const handleBackspace = () => {
        setPin(pin.slice(0, -1));
        setError(false);
      };

      return (
        <div style={{
          minHeight: '100vh',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '20px'
        }}>
          <div className="fade-in" style={{ textAlign: 'center', marginBottom: 48 }}>
            <div style={{
              fontSize: 48, fontWeight: 700,
              letterSpacing: '-2px',
              background: 'linear-gradient(135deg, #3b82f6, #a855f7)',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              marginBottom: 8
            }}>ROUTE11</div>
            <div style={{ color: 'var(--text-dim)', fontSize: 14, fontWeight: 500, letterSpacing: '3px', textTransform: 'uppercase' }}>
              Mailing Hub
            </div>
          </div>

          {/* PIN dots */}
          <div className={error ? 'shake' : ''} style={{ display: 'flex', gap: 16, marginBottom: 40 }}>
            {[0, 1, 2, 3].map(i => (
              <div key={i} className={`pin-dot ${i < pin.length ? (error ? 'error' : 'filled') : ''}`} />
            ))}
          </div>

          {/* Numpad */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 16 }}>
            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => (
              <button key={n} className="pin-key" onClick={() => handleKey(String(n))}>{n}</button>
            ))}
            <div />
            <button className="pin-key" onClick={() => handleKey('0')}>0</button>
            <button className="pin-key" onClick={handleBackspace} style={{ fontSize: 18 }}>⌫</button>
          </div>

          <p style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 24 }}>
            Enter your 4-digit PIN to access
          </p>
        </div>
      );
    }

    // ==================== MAIN APP LAYOUT ====================
    function MainApp({ apiKey, setApiKey, grApi, addToast, onLogout }) {
      const [activeTab, setActiveTab] = useState('smart');
      const [grConnected, setGrConnected] = useState(false);
      const [campaigns, setCampaigns] = useState([]);
      const [fromFields, setFromFields] = useState([]);
      const [loadingGR, setLoadingGR] = useState(false);

      // Connect to GetResponse
      const connectGR = async (key) => {
        if (!key) return;
        setLoadingGR(true);
        try {
          const api = new GetResponseAPI(key);
          const [camps, fields] = await Promise.all([
            api.getCampaigns(),
            api.getFromFields()
          ]);
          setCampaigns(camps || []);
          setFromFields(fields || []);
          setGrConnected(true);
          setApiKey(key);
          addToast(`Connected! ${camps.length} campaigns loaded.`, 'success');
        } catch (err) {
          addToast(`Connection failed: ${err.message}`, 'error');
          setGrConnected(false);
        }
        setLoadingGR(false);
      };

      useEffect(() => {
        if (apiKey && !grConnected) connectGR(apiKey);
      }, []);

      return (
        <div style={{ minHeight: '100vh' }}>
          {/* Header */}
          <header style={{
            borderBottom: '1px solid var(--border)',
            padding: '0 24px',
            background: 'rgba(19,22,31,0.8)',
            backdropFilter: 'blur(12px)',
            position: 'sticky',
            top: 0,
            zIndex: 100
          }}>
            <div style={{
              maxWidth: 1200,
              margin: '0 auto',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              height: 60
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <span style={{
                  fontSize: 22, fontWeight: 700, letterSpacing: '-1px',
                  background: 'linear-gradient(135deg, #3b82f6, #a855f7)',
                  WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
                }}>ROUTE11</span>
                <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>·</span>
                <span style={{ color: 'var(--text-dim)', fontSize: 13, fontWeight: 500 }}>Mailing Hub</span>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',
                    background: grConnected ? 'var(--accent-green)' : 'var(--accent-red)',
                    boxShadow: grConnected ? '0 0 8px rgba(34,197,94,0.5)' : '0 0 8px rgba(239,68,68,0.5)'
                  }} />
                  <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>
                    {grConnected ? 'GetResponse' : 'Disconnected'}
                  </span>
                </div>
                <button className="btn btn-ghost" style={{ padding: '6px 14px', fontSize: 12 }} onClick={onLogout}>
                  Logout
                </button>
              </div>
            </div>

            {/* Tabs */}
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', gap: 4 }}>
              <button className={`tab-btn ${activeTab === 'smart' ? 'active' : ''}`} onClick={() => setActiveTab('smart')}>
                🤖 Smart Mailing
              </button>
              <button className={`tab-btn ${activeTab === 'generator' ? 'active' : ''}`} onClick={() => setActiveTab('generator')}>
                ✉️ Generator
              </button>
              <button className={`tab-btn ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => setActiveTab('settings')}>
                ⚙️ Settings
              </button>
            </div>
          </header>

          {/* Content */}
          <main style={{ maxWidth: 1200, margin: '0 auto', padding: '24px 24px 80px' }}>
            {activeTab === 'smart' && (
              <SmartMailing addToast={addToast} />
            )}
            {activeTab === 'generator' && (
              <MailingGenerator
                grApi={grApi}
                grConnected={grConnected}
                campaigns={campaigns}
                fromFields={fromFields}
                addToast={addToast}
              />
            )}
            {activeTab === 'settings' && (
              <SettingsPanel
                apiKey={apiKey}
                grConnected={grConnected}
                campaigns={campaigns}
                fromFields={fromFields}
                loadingGR={loadingGR}
                onConnect={connectGR}
                addToast={addToast}
              />
            )}
          </main>
        </div>
      );
    }

    // ==================== SMART MAILING ====================
    const GAS_SM_URL = 'https://script.google.com/macros/s/AKfycbxc1oD62fJQT1K9mfxPfanW0Z2HMlfgPG30DoiJuHDFEXj_rv-f5wIUT0VDjfI7yY9Z/exec';
    const SM_SECRET = 'R11Dashboard2026!';

    function SmartMailing({ addToast }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [parsedData, setParsedData] = useState(null);
      const [previewHtml, setPreviewHtml] = useState('');
      const [isRecording, setIsRecording] = useState(false);
      const [step, setStep] = useState('input'); // input | preview | sending | done
      const chatEndRef = useRef(null);
      const inputRef = useRef(null);

      // Scroll to bottom on new messages
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      // Voice: MediaRecorder → Gemini Audio
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const recordingTimerRef = useRef(null);
      const [recordingTime, setRecordingTime] = useState(0);

      const startVoice = async () => {
        if (isRecording) {
          // Stop recording
          if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
            mediaRecorderRef.current.stop();
          }
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';

          const recorder = new MediaRecorder(stream, { mimeType });
          mediaRecorderRef.current = recorder;
          audioChunksRef.current = [];
          setRecordingTime(0);

          recorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunksRef.current.push(e.data);
          };

          recorder.onstop = async () => {
            clearInterval(recordingTimerRef.current);
            stream.getTracks().forEach(t => t.stop());
            setIsRecording(false);
            setRecordingTime(0);

            const blob = new Blob(audioChunksRef.current, { type: mimeType });
            if (blob.size < 1000) {
              addToast('Nagranie za krótkie. Spróbuj ponownie.', 'error');
              return;
            }

            // Convert to base64
            const reader = new FileReader();
            reader.onloadend = async () => {
              const base64 = reader.result.split(',')[1];
              setLoading(true);

              // Add recording message
              const userMsg = { role: 'user', text: '🎤 Nagranie głosowe (' + (blob.size / 1024).toFixed(0) + ' KB)', ts: Date.now() };
              setMessages(prev => [...prev, userMsg]);

              try {
                const context = messages.map(m => m.role + ': ' + m.text).join('\n');
                const previousData = parsedData ? JSON.stringify(parsedData) : '';
                const result = await callGAS_POST('smartMailParseAudio', {
                  audio: base64,
                  mimeType: mimeType,
                  context: context,
                  previousData: previousData
                });

                if (result.success && result.result) {
                  const r = result.result;

                  // If new entry, reset previous
                  if (r.is_new_entry && parsedData) {
                    setMessages(prev => [...prev, {
                      role: 'ai',
                      text: '🆕 Nowy wpis! Poprzedni mailing zastąpiony nowym.',
                      ts: Date.now()
                    }]);
                    setPreviewHtml('');
                    setStep('input');
                  }

                  setParsedData(r);

                  // Show transcription
                  const transcription = result.transcription || r.transcription || '';
                  let aiText = '';
                  if (transcription) {
                    aiText += '📝 Transkrypcja: "' + transcription + '"\n\n';
                  }

                  if (r.complete) {
                    const previewResult = await callGAS('smartMailPreview', r);
                    if (previewResult.success) {
                      setPreviewHtml(previewResult.html);
                      setStep('preview');
                    }
                    aiText += '✅ ' + r.summary + '\n\nPodgląd mailingu jest gotowy.';
                  } else {
                    aiText += r.question || 'Potrzebuję więcej informacji.';
                  }

                  setMessages(prev => [...prev, { role: 'ai', text: aiText, data: r, ts: Date.now() }]);
                } else {
                  // Check if rate limit error — auto-retry
                  const errMsg = result.error || 'Błąd';
                  if (errMsg.includes('429') || errMsg.includes('przepustow') || errMsg.includes('limit') || errMsg.includes('RESOURCE_EXHAUSTED')) {
                    setMessages(prev => [...prev, { role: 'ai', text: '⏳ Serwer zajęty — ponawiam za 8 sekund...', ts: Date.now() }]);
                    await new Promise(r => setTimeout(r, 8000));
                    // Retry the same call
                    const retryResult = await callGAS_POST('smartMailParseAudio', {
                      audio: base64, mimeType: mimeType, context: context, previousData: previousData
                    });
                    if (retryResult.success && retryResult.result) {
                      const rr = retryResult.result;
                      if (rr.is_new_entry && parsedData) {
                        setPreviewHtml(''); setStep('input');
                      }
                      setParsedData(rr);
                      const tr2 = retryResult.transcription || rr.transcription || '';
                      let aiText2 = tr2 ? '📝 Transkrypcja: "' + tr2 + '"\n\n' : '';
                      if (rr.complete) {
                        const prev2 = await callGAS('smartMailPreview', rr);
                        if (prev2.success) { setPreviewHtml(prev2.html); setStep('preview'); }
                        aiText2 += '✅ ' + (rr.summary || 'Sparsowano z audio') + '\n\nPodgląd mailingu jest gotowy.';
                      } else {
                        aiText2 += rr.question || 'Potrzebuję więcej informacji.';
                      }
                      setMessages(prev => [...prev, { role: 'ai', text: aiText2, data: rr, ts: Date.now() }]);
                    } else {
                      setMessages(prev => [...prev, { role: 'ai', text: '❌ ' + (retryResult.error || 'Błąd po ponowieniu'), ts: Date.now() }]);
                    }
                  } else {
                    setMessages(prev => [...prev, { role: 'ai', text: '❌ ' + errMsg, ts: Date.now() }]);
                  }
                }
              } catch (err) {
                setMessages(prev => [...prev, { role: 'ai', text: '❌ Błąd: ' + err.message, ts: Date.now() }]);
              }
              setLoading(false);
            };
            reader.readAsDataURL(blob);
          };

          recorder.start(250); // collect chunks every 250ms
          setIsRecording(true);

          // Timer
          recordingTimerRef.current = setInterval(() => {
            setRecordingTime(t => t + 1);
          }, 1000);

        } catch (err) {
          addToast('Brak dostępu do mikrofonu: ' + err.message, 'error');
        }
      };

      // API call via GET (small payloads)
      const callGAS = async (action, payload) => {
        const url = GAS_SM_URL + '?action=' + action + '&secret=' + SM_SECRET
          + '&payload=' + encodeURIComponent(JSON.stringify(payload));
        const res = await fetch(url, { redirect: 'follow' });
        return res.json();
      };

      // API call via POST (large payloads like audio)
      const callGAS_POST = async (action, payload) => {
        const res = await fetch(GAS_SM_URL, {
          method: 'POST',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: action,
            secret: SM_SECRET,
            ...payload
          })
        });
        return res.json();
      };

      // Send message
      const handleSend = async () => {
        const text = input.trim();
        if (!text) return;

        // Add user message
        const userMsg = { role: 'user', text, ts: Date.now() };
        setMessages(prev => [...prev, userMsg]);
        setInput('');
        setLoading(true);

        try {
          // Build context from previous messages + already parsed data
          const context = messages.map(m => m.role + ': ' + m.text).join('\n');
          const previousData = parsedData ? JSON.stringify(parsedData) : '';

          const result = await callGAS('smartMailParse', { text, context, previousData });

          if (result.success && result.result) {
            const r = result.result;

            // If this is a new entry, reset previous data first
            if (r.is_new_entry && parsedData) {
              setMessages(prev => [...prev, {
                role: 'ai',
                text: '🆕 Nowy wpis! Poprzedni mailing został zastąpiony nowym.',
                ts: Date.now()
              }]);
              setPreviewHtml('');
              setStep('input');
            }

            setParsedData(r);

            if (r.complete) {
              // Generate preview
              const previewResult = await callGAS('smartMailPreview', r);
              if (previewResult.success) {
                setPreviewHtml(previewResult.html);
                setStep('preview');
              }

              const aiMsg = {
                role: 'ai',
                text: '✅ ' + r.summary + '\n\nPodgląd mailingu jest gotowy. Sprawdź po prawej stronie.',
                data: r,
                ts: Date.now()
              };
              setMessages(prev => [...prev, aiMsg]);
            } else {
              // AI needs more info
              const aiMsg = {
                role: 'ai',
                text: r.question || 'Potrzebuję więcej informacji.',
                data: r,
                ts: Date.now()
              };
              setMessages(prev => [...prev, aiMsg]);
            }
          } else {
            const errMsg = { role: 'ai', text: '❌ ' + (result.error || 'Błąd parsowania'), ts: Date.now() };
            setMessages(prev => [...prev, errMsg]);
          }
        } catch (err) {
          const errMsg = { role: 'ai', text: '❌ Błąd: ' + err.message, ts: Date.now() };
          setMessages(prev => [...prev, errMsg]);
        }
        setLoading(false);
      };

      // Send newsletter
      const handleSendNewsletter = async () => {
        if (!parsedData) return;
        setStep('sending');
        setLoading(true);

        try {
          const result = await callGAS('smartMailSend', parsedData);
          if (result.success) {
            setStep('done');
            addToast('✅ Newsletter wysłany! ID: ' + result.newsletterId, 'success');
            const doneMsg = {
              role: 'ai',
              text: '🚀 Newsletter wysłany!\n\nNazwa: ' + result.name + '\nSubject: ' + result.subject + '\nID: ' + result.newsletterId,
              ts: Date.now()
            };
            setMessages(prev => [...prev, doneMsg]);
          } else {
            setStep('preview');
            addToast('❌ Wysyłka nie powiodła się: ' + result.error, 'error');
          }
        } catch (err) {
          setStep('preview');
          addToast('❌ Błąd: ' + err.message, 'error');
        }
        setLoading(false);
      };

      // Reset
      const handleReset = () => {
        setMessages([]);
        setParsedData(null);
        setPreviewHtml('');
        setStep('input');
        setInput('');
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      return (
        <div className="fade-in">
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>🤖 Smart Mailing</h2>
            <span className="badge badge-blue">AI-powered</span>
            {step === 'done' && <span className="badge badge-green">✓ Wysłano</span>}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: step === 'preview' || step === 'done' ? '1fr 1fr' : '1fr', gap: 20 }}>

            {/* LEFT: Chat */}
            <div className="card" style={{ display: 'flex', flexDirection: 'column', minHeight: 500 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 12 }}>
                💬 Opisz wolne auto lub ładunek
              </div>

              {/* Messages */}
              <div style={{
                flex: 1, overflowY: 'auto', marginBottom: 16,
                display: 'flex', flexDirection: 'column', gap: 10
              }}>
                {messages.length === 0 && (
                  <div style={{ color: 'var(--text-muted)', fontSize: 13, textAlign: 'center', padding: '40px 20px' }}>
                    <div style={{ fontSize: 40, marginBottom: 16 }}>🚛</div>
                    <p><b>Wpisz lub nagraj</b> opis wolnego auta / ładunku.</p>
                    <p style={{ fontSize: 12, marginTop: 8 }}>
                      Przykład: <i>"Wolne auto na dzisiaj w Warszawie, destynacja UE, bez ADR"</i>
                    </p>
                    <p style={{ fontSize: 12 }}>
                      Przykład: <i>"Ładunek glikol, jutro z Płocka do Kłajpedy, MONO/MULTI"</i>
                    </p>
                  </div>
                )}
                {messages.map((msg, i) => (
                  <div key={i} style={{
                    alignSelf: msg.role === 'user' ? 'flex-end' : 'flex-start',
                    maxWidth: '85%',
                    padding: '10px 14px',
                    borderRadius: msg.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
                    background: msg.role === 'user' ? 'var(--accent-blue)' : 'var(--bg)',
                    color: msg.role === 'user' ? 'white' : 'var(--text)',
                    fontSize: 13,
                    lineHeight: 1.5,
                    border: msg.role === 'ai' ? '1px solid var(--border)' : 'none',
                    whiteSpace: 'pre-wrap'
                  }}>
                    {msg.text}
                    {msg.data && msg.data.data && (
                      <div style={{
                        marginTop: 8, padding: '8px 10px', borderRadius: 8,
                        background: 'rgba(59,130,246,0.1)', fontSize: 11, fontFamily: 'JetBrains Mono, monospace'
                      }}>
                        {msg.data.type === 'FREE_TRUCK' ? '🚛' : '📦'} {msg.data.type}<br/>
                        📍 {msg.data.data.city}, {msg.data.data.country} → {msg.data.data.destination}<br/>
                        📅 {msg.data.data.date}<br/>
                        {msg.data.data.adr === false ? '✅ NO ADR' : msg.data.data.adr === true ? '⚠️ ADR' : '❓ ADR?'}
                        {msg.data.data.tank_type ? ' · ' + msg.data.data.tank_type : ''}
                        {msg.data.data.product ? '\n📦 ' + msg.data.data.product : ''}
                      </div>
                    )}
                  </div>
                ))}
                {loading && (
                  <div style={{ alignSelf: 'flex-start', padding: '10px 14px', borderRadius: 14, background: 'var(--bg)', border: '1px solid var(--border)' }}>
                    <div className="spinner" style={{ width: 16, height: 16 }} />
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              {/* Input */}
              {!isRecording && (
                <div style={{ display: 'flex', gap: 8 }}>
                  <textarea
                    ref={inputRef}
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder="Wpisz opis lub kliknij mikrofon poniżej..."
                    rows={2}
                    style={{ resize: 'none', flex: 1, fontSize: 14 }}
                    disabled={loading || step === 'sending'}
                  />
                  <button
                    className="btn btn-primary"
                    onClick={handleSend}
                    disabled={loading || !input.trim()}
                    style={{ padding: '10px 16px', borderRadius: 'var(--radius)', fontSize: 14, alignSelf: 'stretch' }}
                  >
                    ➤
                  </button>
                </div>
              )}

              {/* Mic button — always visible, prominent */}
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: isRecording ? 0 : 12 }}>
                <button
                  onClick={startVoice}
                  disabled={loading}
                  style={{
                    width: isRecording ? 100 : 56,
                    height: isRecording ? 100 : 56,
                    borderRadius: '50%',
                    border: 'none',
                    cursor: 'pointer',
                    fontSize: isRecording ? 16 : 24,
                    fontWeight: 700,
                    color: 'white',
                    background: isRecording
                      ? 'linear-gradient(135deg, #ef4444, #dc2626)'
                      : 'linear-gradient(135deg, #3b82f6, #6366f1)',
                    boxShadow: isRecording
                      ? '0 0 0 8px rgba(239,68,68,0.2), 0 0 0 16px rgba(239,68,68,0.1), 0 4px 20px rgba(239,68,68,0.4)'
                      : '0 4px 16px rgba(59,130,246,0.4)',
                    transition: 'all 0.3s ease',
                    animation: isRecording ? 'pulse 1.2s infinite' : 'none',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    flexDirection: 'column',
                    gap: 2
                  }}
                  title={isRecording ? 'Kliknij żeby zakończyć nagrywanie' : 'Nagraj głosówkę'}
                >
                  {isRecording ? (
                    <>
                      <span style={{ fontSize: 20 }}>⏹</span>
                      <span style={{ fontSize: 11 }}>{recordingTime}s</span>
                    </>
                  ) : '🎤'}
                </button>
              </div>
              {!isRecording && !loading && (
                <p style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: 11, margin: '4px 0 0' }}>
                  Kliknij mikrofon i powiedz np. <i>"Wolne auto Warszawa, destynacja UE, bez ADR"</i>
                </p>
              )}
              {isRecording && (
                <p style={{ textAlign: 'center', color: '#f87171', fontSize: 13, fontWeight: 600, margin: '8px 0 0' }}>
                  🔴 Nagrywam... Kliknij ⏹ żeby zakończyć
                </p>
              )}
            </div>

            {/* RIGHT: Preview + Send */}
            {(step === 'preview' || step === 'done') && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {/* Preview */}
                <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
                  <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>
                      👁️ Podgląd mailingu
                    </span>
                    {parsedData && (
                      <span className={`badge ${parsedData.type === 'FREE_TRUCK' ? 'badge-green' : 'badge-blue'}`}>
                        {parsedData.type === 'FREE_TRUCK' ? '🚛 FREE TANK' : '📦 FREE LOAD'}
                      </span>
                    )}
                  </div>
                  <div className="preview-frame" style={{ maxHeight: 400, overflowY: 'auto' }}>
                    <iframe
                      srcDoc={previewHtml}
                      style={{ width: '100%', height: 400, border: 'none' }}
                      title="Email Preview"
                    />
                  </div>
                </div>

                {/* Send options */}
                {step === 'preview' && (
                  <div className="card">
                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 12 }}>
                      🚀 Wyślij mailing
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
                      <div>
                        <label>Wyślij z</label>
                        <select
                          value={parsedData?.send_options?.send_from || 'office@route11.eu'}
                          onChange={e => setParsedData(prev => ({
                            ...prev,
                            send_options: { ...prev.send_options, send_from: e.target.value }
                          }))}
                        >
                          <option value="office@route11.eu">📧 office@route11.eu</option>
                          <option value="chemicals@route11.eu">🧪 chemicals@route11.eu</option>
                          <option value="orders@route11.eu">📋 orders@route11.eu</option>
                        </select>
                      </div>
                      <div>
                        <label>Kiedy</label>
                        <select
                          value={parsedData?.send_options?.send_when === 'now' || !parsedData?.send_options?.send_when ? 'now' : 'schedule'}
                          onChange={e => {
                            if (e.target.value === 'now') {
                              setParsedData(prev => ({
                                ...prev,
                                send_options: { ...prev.send_options, send_when: 'now' }
                              }));
                            } else {
                              // Default to +1 hour
                              const d = new Date(Date.now() + 3600000);
                              const iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + 'T' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
                              setParsedData(prev => ({
                                ...prev,
                                send_options: { ...prev.send_options, send_when: iso }
                              }));
                            }
                          }}
                        >
                          <option value="now">⚡ Wyślij teraz</option>
                          <option value="schedule">📅 Zaplanuj wysyłkę</option>
                        </select>
                      </div>
                    </div>

                    {/* Datetime picker — shown when scheduled */}
                    {parsedData?.send_options?.send_when && parsedData.send_options.send_when !== 'now' && (
                      <div style={{ marginBottom: 16 }}>
                        <label>📅 Data i godzina wysyłki</label>
                        <input
                          type="datetime-local"
                          value={parsedData.send_options.send_when}
                          onChange={e => setParsedData(prev => ({
                            ...prev,
                            send_options: { ...prev.send_options, send_when: e.target.value }
                          }))}
                          style={{ width: '100%', fontSize: 14, padding: '10px 12px' }}
                        />
                        <p style={{ fontSize: 11, color: 'var(--text-muted)', margin: '4px 0 0' }}>
                          Strefa: Europe/Warsaw
                        </p>
                      </div>
                    )}

                    <div style={{ display: 'flex', gap: 8 }}>
                      <button className="btn btn-green" onClick={handleSendNewsletter} disabled={loading} style={{ flex: 1 }}>
                        {loading ? <><div className="spinner" /> Wysyłanie...</> : '🚀 Wyślij newsletter'}
                      </button>
                      <button className="btn btn-ghost" onClick={handleReset}>
                        🔄 Nowy
                      </button>
                    </div>
                  </div>
                )}

                {step === 'done' && (
                  <div className="card" style={{ textAlign: 'center', padding: 32 }}>
                    <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
                    <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Newsletter wysłany!</h3>
                    <p style={{ color: 'var(--text-dim)', fontSize: 13, marginBottom: 20 }}>
                      Mailing trafi do wszystkich kontaktów w GetResponse.
                    </p>
                    <button className="btn btn-primary" onClick={handleReset}>
                      🔄 Wyślij kolejny mailing
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== SETTINGS PANEL ====================
    function SettingsPanel({ apiKey, grConnected, campaigns, fromFields, loadingGR, onConnect, addToast }) {
      const [key, setKey] = useState(apiKey);
      const [showKey, setShowKey] = useState(false);

      return (
        <div className="fade-in" style={{ maxWidth: 640 }}>
          <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24 }}>GetResponse API Settings</h2>

          <div className="card" style={{ marginBottom: 20 }}>
            <label>API Key</label>
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                type={showKey ? 'text' : 'password'}
                value={key}
                onChange={e => setKey(e.target.value)}
                placeholder="Paste your GetResponse API key..."
                style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 13 }}
              />
              <button className="btn btn-ghost" style={{ padding: '8px 12px', flexShrink: 0 }}
                onClick={() => setShowKey(!showKey)}>
                {showKey ? '🙈' : '👁️'}

    // ==================== FREE TANK FORM ====================
    function FreeTankForm({ grApi, grConnected, campaigns, fromFields, addToast }) {
      const [tanks, setTanks] = useState([createEmptyTank()]);
      const [preview, setPreview] = useState(null);
      const [sending, setSending] = useState(false);
      const [sendConfig, setSendConfig] = useState({
        campaignId: '',
        fromFieldId: '',
        sendMode: 'draft', // draft | now | schedule
        scheduleDate: '',
        selectedCampaigns: []
      });

      function createEmptyTank() {
        return {
          id: Date.now() + Math.random(),
          location: '', postalCode: '', country: '',
          date: new Date().toISOString().split('T')[0],
          destination: 'ALL_EU', customDestinations: '',
          adr: false, tankType: 'MONO/MULTI'
        };
      }

      const addTank = () => setTanks([...tanks, createEmptyTank()]);
      const removeTank = (id) => tanks.length > 1 && setTanks(tanks.filter(t => t.id !== id));
      const updateTank = (id, field, value) => setTanks(tanks.map(t => t.id === id ? { ...t, [field]: value } : t));

      const handleGenerate = () => {
        const html = generateMultiFreeTankHTML(tanks);
        const subject = generateSubject(tanks);
        const preheader = generatePreheader(tanks);
        const internalName = generateInternalName(tanks);
        setPreview({ html, subject, preheader, internalName });
      };

      const handleSendGR = async (editedPreview) => {
        if (!grApi) return; const prev = editedPreview || preview;
        setSending(true);
        try {
          const payload = {
            name: prev.internalName,
            type: sendConfig.sendMode === 'draft' ? 'draft' : 'broadcast',
            subject: prev.subject,
            fromField: { fromFieldId: sendConfig.fromFieldId },
            content: { html: prev.html },
            campaign: { campaignId: sendConfig.campaignId }
          };

          // Add send settings for broadcast
          if (sendConfig.sendMode !== 'draft') {
            payload.sendSettings = {
              selectedCampaigns: sendConfig.selectedCampaigns.length > 0
                ? sendConfig.selectedCampaigns
                : [sendConfig.campaignId]
            };
            if (sendConfig.sendMode === 'schedule' && sendConfig.scheduleDate) {
              payload.sendOn = new Date(sendConfig.scheduleDate).toISOString();
            }
          }

          await grApi.createNewsletter(payload);
          addToast(
            sendConfig.sendMode === 'draft'
              ? 'Newsletter saved as draft in GetResponse!'
              : 'Newsletter queued for sending!',
            'success'
          );

          addToast(`Failed: ${err.message}`, 'error');

                </div>
                <div>

                <div>
                  <label>Country</label>

          {/* Preview / Source */}
          {showSource ? (
            <pre style={{
              background: 'var(--bg)', borderRadius: 'var(--radius)',

              color: 'var(--text-dim)', maxHeight: 400, overflow: 'auto',
              whiteSpace: 'pre-wrap', wordBreak: 'break-all',
              lineHeight: 1.6
            }}>
              {preview.html}
            </pre>
          ) : (
            <div className="preview-frame" style={{ marginBottom: 16 }}>
              <iframe
                srcDoc={preview.html}
                style={{ width: '100%', height: 420, border: 'none' }}

              />
            </div>
          )}

          {/* Action buttons */}
          <div style={{ display: 'flex', gap: 8, marginTop: 16, flexWrap: 'wrap' }}>
            <button className="btn btn-primary" onClick={() => {
              const blob = new Blob([preview.html], { type: 'text/html' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url; a.download = `${editName}.html`; a.click();
              URL.revokeObjectURL(url);
            }}>
              📥 Download HTML
            </button>
            <button className="btn btn-ghost" onClick={() => {
              navigator.clipboard.writeText(preview.html);
            }}>
              📋 Copy HTML

              navigator.clipboard.writeText(editSubject);

              📋 Copy Subject

          {grConnected && (

                className={`btn ${sendConfig.sendMode === 'draft' ? 'btn-orange' : 'btn-green'}`}

    function generateSubject(tanks) {

        const t = tanks[0];

        return `🟢 FREE TANK · ${loc} ${t.country} · ${isToday(t.date) ? 'TODAY' : t.date} · ${adrText}`;
      }
      return `🟢 ${tanks.length} FREE TANKS · Multiple Locations`;
    }

    function generatePreheader(tanks) {
      if (tanks.length === 1) {
        const t = tanks[0];
        const dest = t.destination === 'ALL_EU' ? 'EU' : t.destination;
        return `Wolna cysterna ${t.location} → ${dest}. ${t.adr ? 'ADR.' : 'NO ADR.'} Rezerwuj teraz!`;
      }
      return `${tanks.length} wolne cysterny dostępne. Sprawdź lokalizacje i rezerwuj!`;
    }

    function generateInternalName(tanks) {
      const date = new Date().toISOString().split('T')[0].replace(/-/g, '');
      if (tanks.length === 1) return `FREE_TANK_${tanks[0].location}_${tanks[0].country}_${date}`;
      return `FREE_TANKS_${tanks.length}_${date}`;
    }

    function generateRouteSubject(routes) {
      if (routes.length === 1) {
        const r = routes[0];
        const adrText = r.adr ? 'ADR' : 'NO ADR';
        return `🔴 ROUTE · ${r.loadingCity} ${r.loadingCountry} → ${r.unloadingCity} ${r.unloadingCountry} · ${isToday(r.date) ? 'TODAY' : r.date} · ${adrText}`;

      return `🔴 ${routes.length} AVAILABLE ROUTES · Multiple Directions`;
